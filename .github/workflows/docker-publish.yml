name: Build and Publish Docker Images

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/podly-pure-podcasts

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check_files.outputs.skip }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for documentation-only changes
        id: check_files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.ref }}"
            git fetch --no-tags origin "$BASE_REF"
            BASE_SHA=$(git rev-parse "origin/$BASE_REF")
            HEAD_SHA=$(git rev-parse "${{ github.sha }}")
            files_changed=$(git diff --name-only "$BASE_SHA"..."$HEAD_SHA")
          else
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              files_changed=$(git diff --name-only HEAD~1 HEAD)
            else
              files_changed=$(git diff-tree --no-commit-id --name-only -r HEAD)
            fi
          fi

          non_doc_files=$(echo "$files_changed" | grep -v -E '(\.md$|^docs/|LICENCE)' || true)

          if [ -z "$non_doc_files" ] && [ "${{ github.ref_type }}" != "tag" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

  build-amd64:
    needs: changes
    if: ${{ needs.changes.outputs.skip == 'false' }}
    runs-on: ubuntu-latest
    env:
      ARCH: amd64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=-${{ env.ARCH }},onlatest=true
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern=Dev-{{version}},enable=${{ contains(github.ref_name, 'dev') }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=Dev,enable=${{ github.ref_name != 'main' && (github.ref_type != 'tag' || contains(github.ref_name, 'dev')) }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/${{ env.ARCH }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-arm64:
    needs: changes
    if: ${{ needs.changes.outputs.skip == 'false' }}
    runs-on: ubuntu-latest
    env:
      ARCH: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=-${{ env.ARCH }},onlatest=true
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern=Dev-{{version}},enable=${{ contains(github.ref_name, 'dev') }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=Dev,enable=${{ github.ref_name != 'main' && (github.ref_type != 'tag' || contains(github.ref_name, 'dev')) }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/${{ env.ARCH }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  manifest:
    needs: [changes, build-amd64, build-arm64]
    if: ${{ needs.changes.outputs.skip == 'false' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (manifest)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern=Dev-{{version}},enable=${{ contains(github.ref_name, 'dev') }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=Dev,enable=${{ github.ref_name != 'main' && (github.ref_type != 'tag' || contains(github.ref_name, 'dev')) }}

      - name: Create and push manifest
        run: |
          set -euo pipefail
          tags="${{ steps.meta.outputs.tags }}"
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Creating manifest for ${tag}"
            docker buildx imagetools create \
              -t "${tag}" \
              "${tag}-amd64" \
              "${tag}-arm64"
          done <<< "$tags"
