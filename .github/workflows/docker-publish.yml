name: Test and Build Dev Docker Image

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/podly-pure-podcasts

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PIPENV_VENV_IN_PROJECT: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        id: python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "Pipfile.lock"

      - name: Install ffmpeg
        run: sudo apt-get update -y && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install pipenv
        run: pip install pipenv

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ steps.python.outputs.python-version }}-${{ hashFiles('Pipfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-venv-${{ steps.python.outputs.python-version }}-

      - name: Install dependencies
        run: pipenv install --dev --deploy

      - name: Run pylint
        run: pipenv run pylint src --ignore=migrations,tests

      - name: Run black
        run: pipenv run black --check src

      - name: Run isort
        run: pipenv run isort --check-only src

      - name: Run pytest
        run: pipenv run pytest --disable-warnings

  build:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for documentation-only changes
        id: check_files
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            files_changed=$(git diff --name-only HEAD~1 HEAD)
          else
            files_changed=$(git diff-tree --no-commit-id --name-only -r HEAD)
          fi
          non_doc_files=$(echo "$files_changed" | grep -v -E '(\.md$|^docs/|LICENCE)' || true)
          if [ -z "$non_doc_files" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Compute dev version
        if: steps.check_files.outputs.skip == 'false'
        id: version
        run: |
          LAST_TAG=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" | grep -v -- '-' | sort -V | tail -1)
          [ -z "$LAST_TAG" ] && LAST_TAG="v0.0.0"
          BASE_VERSION=${LAST_TAG#v}
          COMMIT_COUNT=$(git rev-list "${LAST_TAG}..HEAD" --count)
          echo "version=${BASE_VERSION}-dev.${COMMIT_COUNT}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Set up QEMU
        if: steps.check_files.outputs.skip == 'false'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check_files.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: steps.check_files.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: steps.check_files.outputs.skip == 'false'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=Dev

      - name: Build and push
        if: steps.check_files.outputs.skip == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
